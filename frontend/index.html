<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packet Capture Data Analysis Platform</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#fafafa;
    color:#111;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* Header */
.header{
    padding:30px 50px;
    font-size:24px;
    font-weight:600;
    letter-spacing:0.5px;
}

/* Main Layout */
.layout{
    display:flex;
    flex:1;
}

/* Sidebar */
.sidebar{
    width:230px;
    padding:40px 25px;
    border-right:1px solid #000;
    box-shadow:2px 0 6px rgba(0,0,0,0.05);
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#111;
    padding:12px 0;
    font-size:14px;
    transition:0.2s ease;
}

.sidebar a:hover{
    padding-left:8px;
    font-weight:500;
}

/* Main Section */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Upload Card */
.upload-box{
    background:#fff;
    border:1px solid #000;
    padding:60px;
    width:400px;
    text-align:center;
    box-shadow:0 8px 16px rgba(0,0,0,0.06);
}

.upload-box h2{
    margin-bottom:25px;
    font-weight:500;
}

input[type="file"]{
    margin:20px 0;
    font-size:14px;
}

button{
    padding:10px 25px;
    border:1px solid #000;
    background:#fff;
    cursor:pointer;
    transition:0.2s ease;
}

button:hover{
    background:#f2f2f2;
}

/* Footer */
.footer{
    border-top:1px solid #000;
    text-align:center;
    padding:15px;
    font-size:13px;
    background:#fff;
    box-shadow:0 -2px 6px rgba(0,0,0,0.04);
}
</style>
</head>

<body>

<div class="header">
    Packet Capture Data Analysis Platform
</div>

<div class="layout">

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <a href="data_cleaning.html">Data Cleaning</a>
        <a href="eda.html">EDA</a>
        <a href="data_analysis.html">Data Analysis</a>
        <a href="ai_analysis.html">AI Analysis</a>
        <a href="visualization.html">Visualization</a>
        <a href="interpretation.html">Interpretation</a>
    </div>

    <!-- Main Upload Area -->
    <div class="main">
        <div class="upload-box">
            <h2>Upload PCAP File</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="pcap_file" accept=".pcap,.pcapng" required>
                <br>
                <button type="submit">Start Analysis</button>
            </form>
        </div>
    </div>

</div>

<div class="footer">
    © 2026 Packet Capture Data Analysis Platform | Designed for Data Analytics Workflow
</div>

</body>
</html>
