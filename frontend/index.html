<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packet Capture Data Analysis Platform</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f8f9fa;
    color:#111;
}

/* Top Title */
.header{
    padding:25px 40px;
    font-size:22px;
    font-weight:600;
}

/* Layout */
.layout{
    display:flex;
    height:90vh;
}

/* Sidebar */
.sidebar{
    width:220px;
    padding:30px 20px;
    border-right:1px solid black;
    box-shadow:2px 0 4px rgba(0,0,0,0.05);
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#111;
    padding:10px 0;
    font-size:14px;
}

.sidebar a:hover{
    padding-left:5px;
}

/* Main Content */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Upload Box */
.upload-box{
    border:1px solid black;
    padding:50px;
    width:350px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.08);
    background:white;
}

.upload-box h2{
    margin-bottom:20px;
    font-weight:500;
}

input[type="file"]{
    margin:15px 0;
}

button{
    padding:8px 20px;
    border:1px solid black;
    background:white;
    cursor:pointer;
}

button:hover{
    background:#f1f1f1;
}
</style>
</head>

<body>

<div class="header">
    Packet Capture Data Analysis Platform
</div>

<div class="layout">

    <!-- Vertical Navigation -->
    <div class="sidebar">
        <a href="data_cleaning.html">Data Cleaning</a>
        <a href="eda.html">EDA</a>
        <a href="data_analysis.html">Data Analysis</a>
        <a href="ai_analysis.html">AI Analysis</a>
        <a href="visualization.html">Visualization</a>
        <a href="interpretation.html">Interpretation</a>
    </div>

    <!-- Main Upload Section -->
    <div class="main">
        <div class="upload-box">
            <h2>Upload PCAP File</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="pcap_file" accept=".pcap,.pcapng" required>
                <br>
                <button type="submit">Start Analysis</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
