<!DOCTYPE html>
<html>
<head>
    <title>NetPeek</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card{
            background:#fff;
            padding:30px;
            width:320px;
            text-align:center;
            border-radius:8px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);
        }
        h2{ margin-bottom:20px; }
        input{
            margin:15px 0;
        }
        button{
            padding:10px 20px;
            border:none;
            background:#111;
            color:#fff;
            cursor:pointer;
            border-radius:4px;
        }
        button:hover{
            opacity:0.85;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>NetPeek Analyzer</h2>
    <input type="file" id="pcapFile">
    <br>
    <button onclick="startScan()">Start Scan</button>
    <p id="status"></p>
</div>

<script>
    function startScan(){
        const file = document.getElementById("pcapFile").files[0];
        const status = document.getElementById("status");

        if(!file){
            status.innerText = "Please upload a PCAP file.";
            return;
        }

        status.innerText = "Scanning " + file.name + "...";
    }
</script>

</body>
</html>
